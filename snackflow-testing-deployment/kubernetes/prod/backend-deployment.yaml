apiVersion: apps/v1
kind: Deployment
metadata:
  name: snackflow-api
  namespace: snackflow-prod
  labels:
    app: snackflow-api
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: snackflow-api
  template:
    metadata:
      labels:
        app: snackflow-api
        component: backend
    spec:
      containers:
      - name: api
        image: snackflow/api:latest
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 3001
          name: websocket
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: snackflow-config
              key: NODE_ENV
        - name: PORT
          value: "3000"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: REDIS_URL
        - name: INFLUXDB_URL
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: INFLUXDB_URL
        - name: INFLUXDB_TOKEN
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: INFLUXDB_TOKEN
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: WEATHER_API_KEY
        - name: GOOGLE_TRANSLATE_API_KEY
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: GOOGLE_TRANSLATE_API_KEY
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: snackflow-secrets
              key: JWT_REFRESH_SECRET
        - name: MAX_CONCURRENT_CONNECTIONS
          valueFrom:
            configMapKeyRef:
              name: snackflow-config
              key: MAX_CONCURRENT_CONNECTIONS
        - name: POLLING_INTERVAL_MS
          valueFrom:
            configMapKeyRef:
              name: snackflow-config
              key: POLLING_INTERVAL_MS
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: snackflow-api-service
  namespace: snackflow-prod
  labels:
    app: snackflow-api
spec:
  selector:
    app: snackflow-api
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: websocket
    port: 3001
    targetPort: 3001
    protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: snackflow-api-hpa
  namespace: snackflow-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: snackflow-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min