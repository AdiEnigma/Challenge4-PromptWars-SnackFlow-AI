<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnackFlow AI</title>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #94a3b8;
      font-size: 1.2rem;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: #38bdf8;
      box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
    }
    .card h2 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
    }
    .card p {
      margin: 0;
      font-size: 1rem;
      color: #cbd5e1;
    }
    .fan { border-top: 4px solid #f43f5e; }
    .vendor { border-top: 4px solid #eab308; }
    .manager { border-top: 4px solid #3b82f6; }
  </style>
</head>
<body>
  <h1>SnackFlow AI</h1>
  <p>Select your interface to get started</p>
  
  <div class="grid">
    <a href="/fan/" class="card fan">
      <h2>📱 Fan Interface</h2>
      <p>Order food, swipe snacks, and skip the lines.</p>
    </a>
    
    <a href="/vendor/" class="card vendor">
      <h2>🏪 Vendor Dashboard</h2>
      <p>Manage orders, see predictions, and restock.</p>
    </a>
    
    <a href="/manager/" class="card manager">
      <h2>📊 Manager Dashboard</h2>
      <p>Stadium-wide analytics and AI insights.</p>
    </a>
  </div>
</body>
</html>
